version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: roadmap_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roadmap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - roadmap_network

volumes:
  postgres_data:

networks:
  roadmap_network:
    driver: bridge
